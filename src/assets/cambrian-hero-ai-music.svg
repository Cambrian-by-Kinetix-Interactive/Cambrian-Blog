<svg width="1020" height="510" viewBox="0 0 1020 510" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1020" height="510" fill="#0a0a0a"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#00d26a" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1020" height="510" fill="url(#glow)"/>

  <!-- Grid lines for tech feel -->
  <line x1="0" y1="255" x2="1020" y2="255" stroke="#222222" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="1020" y2="200" stroke="#181818" stroke-width="0.5"/>
  <line x1="0" y1="310" x2="1020" y2="310" stroke="#181818" stroke-width="0.5"/>
  <line x1="0" y1="145" x2="1020" y2="145" stroke="#141414" stroke-width="0.5"/>
  <line x1="0" y1="365" x2="1020" y2="365" stroke="#141414" stroke-width="0.5"/>

  <!-- Audio waveform - main green wave -->
  <path d="M0 255 Q40 255 60 220 Q80 185 100 230 Q120 275 140 200 Q160 125 180 180 Q200 235 220 160 Q240 85 260 170 Q280 255 300 140 Q320 25 340 130 Q360 235 380 150 Q400 65 420 155 Q440 245 460 170 Q480 95 510 180 Q540 265 560 185 Q580 105 600 175 Q620 245 640 195 Q660 145 680 210 Q700 275 720 225 Q740 175 760 230 Q780 285 800 245 Q820 205 840 240 Q860 275 880 250 Q900 225 920 248 Q940 270 960 255 Q980 240 1000 252 L1020 255"
    stroke="#00d26a" stroke-width="2.5" fill="none" opacity="0.9"/>

  <!-- Secondary wave - lighter -->
  <path d="M0 255 Q50 255 80 235 Q110 215 140 240 Q170 265 200 225 Q230 185 260 220 Q290 255 320 210 Q350 165 380 215 Q410 265 440 230 Q470 195 510 235 Q550 275 580 240 Q610 205 640 235 Q670 265 700 245 Q730 225 760 248 Q790 270 820 255 Q850 240 880 252 Q910 264 940 255 Q970 246 1000 253 L1020 255"
    stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Tertiary wave -->
  <path d="M0 255 Q60 255 100 270 Q140 285 180 260 Q220 235 260 275 Q300 315 340 280 Q380 245 420 270 Q460 295 510 265 Q560 235 600 260 Q640 285 680 265 Q720 245 760 260 Q800 275 840 258 Q880 242 920 255 Q960 268 1000 256 L1020 255"
    stroke="#00d26a" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- Glow dots on peaks -->
  <circle cx="260" cy="170" r="3" fill="#00d26a" opacity="0.6"/>
  <circle cx="340" cy="130" r="4" fill="#00d26a" opacity="0.8"/>
  <circle cx="420" cy="155" r="3" fill="#00d26a" opacity="0.5"/>
  <circle cx="510" cy="180" r="3" fill="#00d26a" opacity="0.6"/>
  <circle cx="600" cy="175" r="3" fill="#00d26a" opacity="0.5"/>

  <!-- Glow halos on main peaks -->
  <circle cx="340" cy="130" r="12" fill="#00d26a" opacity="0.08"/>
  <circle cx="260" cy="170" r="10" fill="#00d26a" opacity="0.06"/>
  <circle cx="510" cy="180" r="10" fill="#00d26a" opacity="0.06"/>

  <!-- Music note icon -->
  <g transform="translate(470, 390)" opacity="0.15">
    <circle cx="0" cy="15" r="8" fill="#00d26a"/>
    <circle cx="20" cy="10" r="8" fill="#00d26a"/>
    <line x1="8" y1="15" x2="8" y2="-20" stroke="#00d26a" stroke-width="2"/>
    <line x1="28" y1="10" x2="28" y2="-25" stroke="#00d26a" stroke-width="2"/>
    <line x1="8" y1="-20" x2="28" y2="-25" stroke="#00d26a" stroke-width="2"/>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="506" width="1020" height="4" fill="url(#borderGrad)"/>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0a0a0a"/>
    <stop offset="30%" stop-color="#00d26a"/>
    <stop offset="70%" stop-color="#00d26a"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </linearGradient>
</svg>
