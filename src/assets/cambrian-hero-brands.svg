<svg width="1020" height="510" viewBox="0 0 1020 510" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1020" height="510" fill="#0a0a0a"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glowBrand" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00d26a" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1020" height="510" fill="url(#glowBrand)"/>

  <!-- Grid lines -->
  <line x1="0" y1="255" x2="1020" y2="255" stroke="#222222" stroke-width="0.5"/>
  <line x1="0" y1="180" x2="1020" y2="180" stroke="#181818" stroke-width="0.5"/>
  <line x1="0" y1="330" x2="1020" y2="330" stroke="#181818" stroke-width="0.5"/>

  <!-- Abstract building shapes representing brands -->
  <rect x="200" y="180" width="60" height="140" rx="4" stroke="#333333" stroke-width="1" fill="#141414"/>
  <rect x="200" y="180" width="60" height="140" rx="4" fill="#00d26a" opacity="0.05"/>

  <rect x="310" y="150" width="70" height="170" rx="4" stroke="#333333" stroke-width="1" fill="#141414"/>
  <rect x="310" y="150" width="70" height="170" rx="4" fill="#00d26a" opacity="0.05"/>

  <rect x="430" y="200" width="55" height="120" rx="4" stroke="#333333" stroke-width="1" fill="#141414"/>
  <rect x="430" y="200" width="55" height="120" rx="4" fill="#00d26a" opacity="0.05"/>

  <rect x="540" y="160" width="65" height="160" rx="4" stroke="#333333" stroke-width="1" fill="#141414"/>
  <rect x="540" y="160" width="65" height="160" rx="4" fill="#00d26a" opacity="0.05"/>

  <rect x="660" y="190" width="60" height="130" rx="4" stroke="#333333" stroke-width="1" fill="#141414"/>
  <rect x="660" y="190" width="60" height="130" rx="4" fill="#00d26a" opacity="0.05"/>

  <rect x="770" y="170" width="55" height="150" rx="4" stroke="#333333" stroke-width="1" fill="#141414"/>
  <rect x="770" y="170" width="55" height="150" rx="4" fill="#00d26a" opacity="0.05"/>

  <!-- Sound wave connections between buildings -->
  <path d="M260 250 Q285 235 310 250" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M380 240 Q405 225 430 240" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M485 260 Q512 245 540 260" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M605 250 Q632 235 660 250" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M720 255 Q745 240 770 255" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Secondary wave connections -->
  <path d="M260 250 Q285 270 310 250" stroke="#00d26a" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M380 240 Q405 258 430 240" stroke="#00d26a" stroke-width="1" fill="none" opacity="0.18"/>
  <path d="M485 260 Q512 278 540 260" stroke="#00d26a" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M605 250 Q632 268 660 250" stroke="#00d26a" stroke-width="1" fill="none" opacity="0.18"/>
  <path d="M720 255 Q745 272 770 255" stroke="#00d26a" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- Pulse dots at connection points -->
  <circle cx="285" cy="240" r="3" fill="#00d26a" opacity="0.5"/>
  <circle cx="405" cy="232" r="2.5" fill="#00d26a" opacity="0.4"/>
  <circle cx="512" cy="250" r="3" fill="#00d26a" opacity="0.5"/>
  <circle cx="632" cy="242" r="2.5" fill="#00d26a" opacity="0.4"/>
  <circle cx="745" cy="247" r="2" fill="#00d26a" opacity="0.35"/>

  <!-- Glow halos -->
  <circle cx="510" cy="255" r="180" fill="#00d26a" opacity="0.02"/>

  <!-- Bottom border accent -->
  <rect x="0" y="506" width="1020" height="4" fill="url(#borderGradBrand)"/>
  <linearGradient id="borderGradBrand" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0a0a0a"/>
    <stop offset="30%" stop-color="#00d26a"/>
    <stop offset="70%" stop-color="#00d26a"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </linearGradient>
</svg>