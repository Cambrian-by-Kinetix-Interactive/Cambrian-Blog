<svg width="1020" height="510" viewBox="0 0 1020 510" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1020" height="510" fill="#0a0a0a"/>

  <!-- Subtle radial glow behind upload area -->
  <radialGradient id="glow2" cx="50%" cy="45%" r="40%">
    <stop offset="0%" stop-color="#00d26a" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1020" height="510" fill="url(#glow2)"/>

  <!-- Step indicators - horizontal flow -->
  <!-- Step 1 -->
  <rect x="120" y="140" width="160" height="160" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <text x="200" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#00d26a">1</text>
  <text x="200" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#a0a0a0">Create</text>
  <text x="200" y="253" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#a0a0a0">Account</text>

  <!-- Arrow 1 -->
  <path d="M295 220 L330 220" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M325 215 L332 220 L325 225" stroke="#333333" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 2 -->
  <rect x="345" y="140" width="160" height="160" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <text x="425" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#00d26a">2</text>
  <text x="425" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#a0a0a0">Upload</text>
  <text x="425" y="253" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#a0a0a0">Track</text>

  <!-- Arrow 2 -->
  <path d="M520 220 L555 220" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M550 215 L557 220 L550 225" stroke="#333333" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 3 -->
  <rect x="570" y="140" width="160" height="160" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <text x="650" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#00d26a">3</text>
  <text x="650" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#a0a0a0">Set</text>
  <text x="650" y="253" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#a0a0a0">License</text>

  <!-- Arrow 3 -->
  <path d="M745 220 L780 220" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M775 215 L782 220 L775 225" stroke="#333333" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 4 - highlighted -->
  <rect x="795" y="140" width="160" height="160" rx="12" fill="#141414" stroke="#00d26a" stroke-width="1.5"/>
  <circle cx="875" cy="140" r="0" fill="none"/>
  <text x="875" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#00d26a">4</text>
  <text x="875" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Publish</text>
  <text x="875" y="253" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#00d26a">Live!</text>

  <!-- Glow behind step 4 -->
  <rect x="795" y="140" width="160" height="160" rx="12" fill="none" stroke="#00d26a" stroke-width="1" opacity="0.15" transform="scale(1.05)" transform-origin="875 220"/>

  <!-- Timer badge -->
  <rect x="430" y="360" width="160" height="44" rx="22" fill="#141414" stroke="#222222" stroke-width="1"/>
  <text x="480" y="387" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#00d26a">&lt; 10</text>
  <text x="540" y="387" text-anchor="start" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#a0a0a0">min</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="506" width="1020" height="4" fill="url(#borderGrad2)"/>
  <linearGradient id="borderGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0a0a0a"/>
    <stop offset="30%" stop-color="#00d26a"/>
    <stop offset="70%" stop-color="#00d26a"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </linearGradient>
</svg>
