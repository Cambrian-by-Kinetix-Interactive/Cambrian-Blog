<svg width="1020" height="510" viewBox="0 0 1020 510" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1020" height="510" fill="#0a0a0a"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glowGame" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00d26a" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1020" height="510" fill="url(#glowGame)"/>

  <!-- Grid lines -->
  <line x1="0" y1="255" x2="1020" y2="255" stroke="#222222" stroke-width="0.5"/>
  <line x1="0" y1="180" x2="1020" y2="180" stroke="#181818" stroke-width="0.5"/>
  <line x1="0" y1="330" x2="1020" y2="330" stroke="#181818" stroke-width="0.5"/>

  <!-- Game controller outline -->
  <g transform="translate(390, 170)" opacity="0.8">
    <!-- Controller body -->
    <path d="M40 60 Q40 20 80 20 L160 20 Q200 20 200 60 L200 100 Q200 150 160 150 L140 150 Q120 150 110 170 L100 170 Q90 150 80 150 L60 150 Q20 150 20 100 L20 60 Z"
      stroke="#00d26a" stroke-width="2" fill="none" opacity="0.6"/>

    <!-- D-pad -->
    <rect x="55" y="70" width="10" height="30" rx="2" fill="#00d26a" opacity="0.3"/>
    <rect x="45" y="80" width="30" height="10" rx="2" fill="#00d26a" opacity="0.3"/>

    <!-- Buttons -->
    <circle cx="170" cy="70" r="6" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
    <circle cx="185" cy="85" r="6" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
    <circle cx="155" cy="85" r="6" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
    <circle cx="170" cy="100" r="6" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Sound waves emanating from controller - left side -->
  <path d="M350 255 Q330 230 350 200" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M330 255 Q300 220 330 175" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M310 255 Q270 210 310 150" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Sound waves - right side -->
  <path d="M670 255 Q690 230 670 200" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M690 255 Q720 220 690 175" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M710 255 Q750 210 710 150" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Sound waves - bottom left -->
  <path d="M350 255 Q330 280 350 310" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M330 255 Q300 290 330 335" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M310 255 Q270 300 310 360" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Sound waves - bottom right -->
  <path d="M670 255 Q690 280 670 310" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M690 255 Q720 290 690 335" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M710 255 Q750 300 710 360" stroke="#00d26a" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Music note particles -->
  <circle cx="250" cy="180" r="3" fill="#00d26a" opacity="0.4"/>
  <circle cx="780" cy="200" r="2.5" fill="#00d26a" opacity="0.3"/>
  <circle cx="220" cy="320" r="2" fill="#00d26a" opacity="0.25"/>
  <circle cx="800" cy="340" r="3" fill="#00d26a" opacity="0.35"/>
  <circle cx="270" cy="140" r="2" fill="#00d26a" opacity="0.2"/>
  <circle cx="760" cy="150" r="2.5" fill="#00d26a" opacity="0.25"/>

  <!-- Glow halos -->
  <circle cx="510" cy="255" r="100" fill="#00d26a" opacity="0.03"/>
  <circle cx="510" cy="255" r="60" fill="#00d26a" opacity="0.04"/>

  <!-- Bottom border accent -->
  <rect x="0" y="506" width="1020" height="4" fill="url(#borderGradGame)"/>
  <linearGradient id="borderGradGame" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0a0a0a"/>
    <stop offset="30%" stop-color="#00d26a"/>
    <stop offset="70%" stop-color="#00d26a"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </linearGradient>
</svg>