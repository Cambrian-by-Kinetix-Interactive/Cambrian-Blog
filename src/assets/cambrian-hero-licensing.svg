<svg width="1020" height="510" viewBox="0 0 1020 510" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1020" height="510" fill="#0a0a0a"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow3" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#00d26a" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1020" height="510" fill="url(#glow3)"/>

  <!-- Three license cards -->

  <!-- Non-Exclusive Card -->
  <rect x="100" y="110" width="240" height="280" rx="14" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="100" y="110" width="240" height="56" rx="14" fill="#1a1a1a"/>
  <rect x="100" y="140" width="240" height="26" fill="#1a1a1a"/>
  <text x="220" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Non-Exclusive</text>

  <!-- Repeat icon -->
  <circle cx="220" cy="220" r="24" fill="none" stroke="#00d26a" stroke-width="1.5"/>
  <path d="M208 215 L208 225 L218 225" stroke="#00d26a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M232 225 L232 215 L222 215" stroke="#00d26a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="220" y="272" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">Sell to many buyers</text>
  <text x="220" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">You keep ownership</text>
  <text x="220" y="308" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">Recurring revenue</text>

  <rect x="150" y="340" width="140" height="32" rx="16" fill="none" stroke="#333333" stroke-width="1"/>
  <text x="220" y="361" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#a0a0a0">$15 — $100</text>

  <!-- Exclusive Card (highlighted) -->
  <rect x="390" y="110" width="240" height="280" rx="14" fill="#141414" stroke="#00d26a" stroke-width="1.5"/>
  <rect x="390" y="110" width="240" height="56" rx="14" fill="#0d2b18"/>
  <rect x="390" y="140" width="240" height="26" fill="#0d2b18"/>
  <text x="510" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#00d26a">Exclusive</text>

  <!-- Lock icon -->
  <rect x="502" y="218" width="16" height="13" rx="3" fill="none" stroke="#00d26a" stroke-width="1.5"/>
  <path d="M505 218 L505 213 Q505 207 510 207 Q515 207 515 213 L515 218" stroke="#00d26a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <text x="510" y="272" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">One buyer only</text>
  <text x="510" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">Premium pricing</text>
  <text x="510" y="308" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">Limited edition value</text>

  <rect x="440" y="340" width="140" height="32" rx="16" fill="#0d2b18" stroke="#00d26a" stroke-width="1"/>
  <text x="510" y="361" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#00d26a">5–10× more</text>

  <!-- Buyout Card -->
  <rect x="680" y="110" width="240" height="280" rx="14" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="680" y="110" width="240" height="56" rx="14" fill="#1a1a1a"/>
  <rect x="680" y="140" width="240" height="26" fill="#1a1a1a"/>
  <text x="800" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Buyout</text>

  <!-- Transfer/handoff icon -->
  <path d="M788 215 L812 215" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M807 210 L813 215 L807 220" stroke="#00d26a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M812 227 L788 227" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M793 222 L787 227 L793 232" stroke="#00d26a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="800" y="272" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">Full ownership transfer</text>
  <text x="800" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">One-time payment</text>
  <text x="800" y="308" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">Highest payout</text>

  <rect x="730" y="340" width="140" height="32" rx="16" fill="none" stroke="#333333" stroke-width="1"/>
  <text x="800" y="361" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#a0a0a0">10–20× more</text>

  <!-- Bottom label -->
  <text x="510" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#555555">Choose the right license path for every track</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="506" width="1020" height="4" fill="url(#borderGrad3)"/>
  <linearGradient id="borderGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0a0a0a"/>
    <stop offset="30%" stop-color="#00d26a"/>
    <stop offset="70%" stop-color="#00d26a"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </linearGradient>
</svg>
