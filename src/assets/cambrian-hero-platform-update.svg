<svg width="1020" height="510" viewBox="0 0 1020 510" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1020" height="510" fill="#0a0a0a"/>

  <!-- Radial glow -->
  <radialGradient id="glow" cx="50%" cy="45%" r="45%">
    <stop offset="0%" stop-color="#00d26a" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1020" height="510" fill="url(#glow)"/>

  <!-- Version badge -->
  <rect x="410" y="60" width="200" height="36" rx="18" fill="#0d2b18" stroke="#00d26a" stroke-width="1"/>
  <text x="510" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#00d26a">PLATFORM UPDATE</text>

  <!-- Card 1: Creator Dashboard -->
  <rect x="100" y="130" width="260" height="140" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="124" y="154" width="28" height="28" rx="6" fill="#0d2b18"/>
  <path d="M132 168 L140 168 M132 164 L144 164 M132 172 L138 172" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="164" y="170" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Creator Dashboard</text>
  <text x="124" y="204" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">Track views, licensing activity,</text>
  <text x="124" y="220" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">and revenue — all in one place.</text>
  <rect x="124" y="240" width="60" height="4" rx="2" fill="#00d26a" opacity="0.6"/>
  <rect x="190" y="240" width="40" height="4" rx="2" fill="#00d26a" opacity="0.3"/>
  <rect x="236" y="240" width="80" height="4" rx="2" fill="#00d26a" opacity="0.15"/>

  <!-- Card 2: Smart Search -->
  <rect x="380" y="130" width="260" height="140" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="404" y="154" width="28" height="28" rx="6" fill="#0d2b18"/>
  <circle cx="415" cy="166" r="7" fill="none" stroke="#00d26a" stroke-width="1.5"/>
  <line x1="420" y1="171" x2="424" y2="175" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="444" y="170" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Smart Search</text>
  <text x="404" y="204" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">Buyers find music by mood,</text>
  <text x="404" y="220" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">genre, tempo, and use case.</text>
  <rect x="404" y="240" width="80" height="4" rx="2" fill="#00d26a" opacity="0.5"/>
  <rect x="490" y="240" width="50" height="4" rx="2" fill="#00d26a" opacity="0.25"/>

  <!-- Card 3: Instant Licensing -->
  <rect x="660" y="130" width="260" height="140" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="684" y="154" width="28" height="28" rx="6" fill="#0d2b18"/>
  <path d="M694 172 L700 166 L706 172" stroke="#00d26a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="700" y1="166" x2="700" y2="178" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="724" y="170" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Instant Licensing</text>
  <text x="684" y="204" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">Clear terms, one-click purchase,</text>
  <text x="684" y="220" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">no negotiation required.</text>
  <rect x="684" y="240" width="90" height="4" rx="2" fill="#00d26a" opacity="0.6"/>
  <rect x="780" y="240" width="30" height="4" rx="2" fill="#00d26a" opacity="0.2"/>

  <!-- Card 4: Creator Profiles -->
  <rect x="100" y="290" width="260" height="140" rx="12" fill="#141414" stroke="#00d26a" stroke-width="1"/>
  <rect x="124" y="314" width="28" height="28" rx="6" fill="#0d2b18"/>
  <circle cx="138" cy="324" r="6" fill="none" stroke="#00d26a" stroke-width="1.5"/>
  <path d="M131 336 Q138 330 145 336" stroke="#00d26a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="164" y="330" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Creator Profiles</text>
  <text x="124" y="364" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">Your storefront. Your brand.</text>
  <text x="124" y="380" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">Buyers browse and return.</text>
  <text x="124" y="410" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#00d26a">NEW</text>

  <!-- Card 5: 3 License Paths -->
  <rect x="380" y="290" width="260" height="140" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="404" y="314" width="28" height="28" rx="6" fill="#0d2b18"/>
  <path d="M412 328 L424 328 M412 324 L420 324 M412 332 L418 332" stroke="#00d26a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="444" y="330" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff">3 License Paths</text>
  <text x="404" y="364" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">Non-exclusive, exclusive, and</text>
  <text x="404" y="380" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">buyout — set per track.</text>
  <text x="404" y="410" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#00d26a">IMPROVED</text>

  <!-- Card 6: Analytics -->
  <rect x="660" y="290" width="260" height="140" rx="12" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="684" y="314" width="28" height="28" rx="6" fill="#0d2b18"/>
  <rect x="690" y="332" width="4" height="8" fill="#00d26a" opacity="0.5"/>
  <rect x="696" y="327" width="4" height="13" fill="#00d26a" opacity="0.7"/>
  <rect x="702" y="322" width="4" height="18" fill="#00d26a" opacity="0.9"/>
  <text x="724" y="330" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Track Analytics</text>
  <text x="684" y="364" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">See what's getting views and</text>
  <text x="684" y="380" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#808080">what's converting to sales.</text>
  <text x="684" y="410" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#00d26a">NEW</text>

  <!-- Bottom label -->
  <text x="510" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500" fill="#555555">cambrianmusic.com — April 2026</text>

  <!-- Bottom border accent -->
  <rect x="0" y="506" width="1020" height="4" fill="url(#borderGrad)"/>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0a0a0a"/>
    <stop offset="30%" stop-color="#00d26a"/>
    <stop offset="70%" stop-color="#00d26a"/>
    <stop offset="100%" stop-color="#0a0a0a"/>
  </linearGradient>
</svg>
